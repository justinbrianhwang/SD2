project_name: "SD2 MVP"

stages:
  - vision
  - semantic
  - reasoning
  - planning
  - control
  - outcome

pairing:
  # Pairing anchor mode:
  # - frame_idx: exact frame-index match; default and backward-compatible.
  # - timestamp: nearest stress timestamp within timestamp_tolerance seconds.
  # - route_progress: nearest stress route_progress within progress_tolerance.
  mode: frame_idx
  timestamp_tolerance: 0.06
  progress_tolerance: 0.02
  key:
    - model_id
    - scenario_id
    - seed
    - frame_idx

normalization:
  method: "minmax"
  clip_min: 0.0
  clip_max: 1.0

thresholds:
  warning: 0.4
  critical: 0.7

metrics:
  vision:
    type: "embedding_cosine"
  semantic:
    type: "object_jaccard"
  reasoning:
    type: "text_embedding_and_intent"
    weights:
      text_embedding: 0.5
      intent_mismatch: 0.3
      critical_object_mismatch: 0.2
  planning:
    type: "waypoint_ade"
    ade_scale: 5.0
  control:
    type: "weighted_action_mae"
    weights:
      steer: 0.5
      throttle: 0.25
      brake: 0.25

diagnosis:
  primary_failure_policy: "first_critical_with_downstream_increase"
  propagation_lag: 0
  downstream_window: 5
  downstream_min_delta: 0.0
  epsilon: 1.0e-6
  noise_floor: 0.05
  propagation_ratio_cap: 10.0
  route_progress_drop_threshold: 0.05
  # A collapse onset requires the deviation to stay at/above threshold for this
  # many consecutive frames, so single-frame outlier spikes are not counted.
  onset_persistence_frames: 3
